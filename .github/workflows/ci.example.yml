# ==============================================================================
# Esqueleto de CI para Django — DESACTIVADO por defecto.
# Renómbralo a `ci.yml` para activarlo. Mientras tenga la extensión `.example`,
# GitHub Actions no lo ejecuta. Ajusta versiones y comandos a tu gusto.
# ==============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Lint
        run: ruff check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: techworld
          POSTGRES_USER: techworld
          POSTGRES_PASSWORD: techworld
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "True"
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: techworld
      DB_USER: techworld
      DB_PASSWORD: techworld
    steps:
      - uses: actions/checkout@v7
      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migraciones
        run: python manage.py migrate
      - name: Tests
        run: python manage.py test
